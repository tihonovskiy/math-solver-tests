# Appium server
appium.server.url=http://127.0.0.1:4723
# Set to true to start Appium server automatically (no need to run `appium` manually)
appium.autostart=false

# Device (real device defaults; override for simulator via -D flags, see README)
# Override at runtime: -Dplatform.version=26.4 -Ddevice.name="iPhone 16"
platform.name=iOS
platform.version=18.0
device.name=iPhone 16
automation.name=XCUITest

# Real device (leave empty for simulator — override via -D flags, see README)
udid=
xcode.org.id=
xcode.signing.id=

# App (prefer bundle.id for installed app; set app.path to install from .app)
bundle.id=com.worbert.mathapp
app.path=
no.reset=false

# Timeouts (seconds)
new.command.timeout=120
wait.timeout=15
